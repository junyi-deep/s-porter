name: Build desktop packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  macos:
    name: macOS package
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select stable Rust
        run: rustup update stable && rustup default stable
      - name: Build release binary
        run: cargo build --release --locked
      - name: Create app bundle
        shell: bash
        run: |
          APP="dist/S Porter.app"
          mkdir -p "$APP/Contents/MacOS"
          cp target/release/s-porter "$APP/Contents/MacOS/s-porter"
          chmod +x "$APP/Contents/MacOS/s-porter"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleDisplayName</key><string>S Porter</string>
            <key>CFBundleExecutable</key><string>s-porter</string>
            <key>CFBundleIdentifier</key><string>dev.sporter.desktop</string>
            <key>CFBundleName</key><string>S Porter</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>0.1.0</string>
            <key>LSMinimumSystemVersion</key><string>12.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          PLIST
          codesign --force --deep --sign - "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" dist/s-porter-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: s-porter-macos
          path: dist/s-porter-macos.zip
          if-no-files-found: error

  windows:
    name: Windows package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select stable Rust
        shell: pwsh
        run: rustup update stable; rustup default stable
      - name: Build release binary
        run: cargo build --release --locked
      - name: Create ZIP package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path target/release/s-porter.exe -DestinationPath dist/s-porter-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: s-porter-windows
          path: dist/s-porter-windows.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" artifacts/*/*.zip
          --repo "$GITHUB_REPOSITORY"
          --generate-notes
          --verify-tag
